services:
  - type: web
    name: cyclebubble-api
    runtime: python
    # 仓库根在 /opt/render/project/src（Render 的默认挂载点）
    # 不设 rootDir，build 时把仓库根作为 cwd；startCommand 显式 --app-dir backend
    installCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: CB_JWT_SECRET
        generateValue: true   # Render 自动生成强随机密钥
      - key: DEEPSEEK_API_KEY
        sync: false            # 不从环境读取，部署时手动填（可选）
      - key: CB_CORS_ORIGINS
        # GH Pages 域名（你的）+ Render 自己的 URL + 本地开发端口
        value: "https://qiandkk.github.io,https://cyclebubble-api.onrender.com,http://localhost:8766,http://127.0.0.1:8766"
      - key: CB_DEMO_USER
        value: "1"              # Render 也注入 demo 账号，让用户立刻能进
    plan: free
