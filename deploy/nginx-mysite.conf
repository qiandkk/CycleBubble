server
{
    listen 80;
    listen [::]:80;
    server_name _;

    index index.html;
    root /var/www/frontend;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ====== Admin 后台：先尝试静态文件（/admin.html），否则反代 ======
    # 用 ^~ /admin/ 前缀匹配 + try_files，让 admin.html 这种"名字像 API 的静态页"先匹配静态
    location ^~ /admin/ {
        try_files $uri @admin_api;
    }
    location @admin_api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ====== 后端 API 反向代理 ======
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
    }

    # ====== 关键前端文件：每次都不缓存（patch 频繁） ======
    location ~ ^/(index\.html|api\.js|styles\.css|script\.js|admin\.html|admin\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ====== SPA fallback ======
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ====== 其他静态资源（图片字体等）缓存 7 天 ======
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    access_log /www/wwwlogs/mysite.access.log;
    error_log  /www/wwwlogs/mysite.error.log;
}
